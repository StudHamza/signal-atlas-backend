name: Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Only one deployment runs at a time
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # CI must pass before we deploy
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test        # ← won't deploy if tests fail

    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}       # defaults to 22 if not set
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}         # e.g. /opt/network-monitor

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Rebuilding and restarting containers"
            docker compose pull   # pull any updated base images
            docker compose up -d --build --remove-orphans

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Deployment complete"